services:
  # Redis服务
  redis:
    image: redis:7-alpine
    container_name: short-url-redis
    restart: always
    ports:
      - "6379:6379"
    volumes:
      - short-url-redis-data:/data
    networks:
      - short-url-network
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 5s

  # MySQL服务（优化时区、健康检查）
  mysql:
    image: mysql:8.0
    container_name: short-url-mysql
    restart: always
    environment:
      MYSQL_ROOT_PASSWORD: 123456
      MYSQL_DATABASE: short_url_db
      MYSQL_CHARACTER_SET_SERVER: utf8mb4
      MYSQL_COLLATION_SERVER: utf8mb4_unicode_ci
      TZ: Asia/Shanghai
    ports:
      - "3306:3306"
    volumes:
      - ./init.sql:/docker-entrypoint-initdb.d/init.sql
      - short-url-mysql-data:/var/lib/mysql
    networks:
      - short-url-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456"]
      interval: 5s
      timeout: 10s
      retries: 10
      start_period: 10s

  short-url-app:
    image: lattt/short-url-pro:0.0.1
    container_name: short-url-pro
    restart: always
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:mysql://mysql:3306/short_url_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
      SPRING_DATASOURCE_USERNAME: root
      SPRING_DATASOURCE_PASSWORD: 123456
      JAVA_OPTS: "-Xms256m -Xmx512m -Dfile.encoding=UTF-8 -Duser.timezone=Asia/Shanghai"
      SHORT_URL_BASE_URL: http://你的服务器IP:8080
      TZ: Asia/Shanghai
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - short-url-network
    volumes:
      - short-url-app-logs:/app/logs

networks:
  short-url-network:
    driver: bridge

volumes:
  short-url-mysql-data:
  short-url-app-logs:
  short-url-redis-data: