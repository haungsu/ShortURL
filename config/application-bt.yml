# ============================================
# ShortURLPro 宝塔面板部署配置 (application-bt.yml)
# ============================================

spring:
  # ============================================
  # 应用配置
  # ============================================
  application:
    name: ShortURLPro-BT
  
  # ============================================
  # 数据库配置 - 宝塔面板专用
  # ============================================
  datasource:
    # 注意：请根据宝塔面板实际的MySQL配置修改以下参数
    url: jdbc:mysql://localhost:3306/shorturldb?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true
    username: root  # 请修改为宝塔面板MySQL的实际用户名
    password:       # 请修改为宝塔面板MySQL的实际密码
    driver-class-name: com.mysql.cj.jdbc.Driver
    
    # 连接池配置
    hikari:
      minimum-idle: 5
      maximum-pool-size: 20
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 30000
      pool-name: HikariPool-BT
  
  # ============================================
  # JPA/Hibernate配置
  # ============================================
  jpa:
    hibernate:
      ddl-auto: update  # 自动创建/更新表结构
    show-sql: false     # 生产环境关闭SQL输出
    properties:
      hibernate:
        format_sql: false
        dialect: org.hibernate.dialect.MySQLDialect
  
  # ============================================
  # Redis配置 - 宝塔面板专用
  # ============================================
  data:
    redis:
      host: localhost   # 请修改为宝塔面板Redis的实际地址
      port: 6379        # 请确认宝塔面板Redis端口
      password:         # 如果设置了Redis密码，请填写
      database: 0
      timeout: 3000ms
      
      # 连接池配置
      lettuce:
        pool:
          max-active: 20
          max-idle: 10
          min-idle: 5
          max-wait: 3000ms
  
  # ============================================
  # 缓存配置
  # ============================================
  cache:
    type: redis
    redis:
      time-to-live: 1800000  # 30分钟
      cache-null-values: false

# ============================================
# 应用自定义配置
# ============================================
app:
  short-url:
    base-url: ${SHORT_URL_BASE_URL:http://localhost:8080}
    code-length: 6
    default-expire-days: 30

# ============================================
# 服务器配置
# ============================================
server:
  port: 8080
  # 错误处理配置
  error:
    include-message: on-param
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

# ============================================
# 日志配置
# ============================================
logging:
  level:
    root: WARN
    com.example.shorturlpro: INFO
    org.springframework.web: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n"

# ============================================
# 管理端点配置
# ============================================
management:
  endpoints:
    web:
      exposure:
        include: health,info
  endpoint:
    health:
      show-details: when-authorized