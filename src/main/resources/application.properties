# =============================================
# 应用基础配置
# =============================================
spring.application.name=ShortURLPro
server.port=8080

# =============================================
# 数据库连接配置 (MySQL 8.0) - 测试配置
# =============================================
spring.datasource.url=jdbc:mysql://localhost:3306/?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true&zeroDateTimeBehavior=convertToNull
spring.datasource.username=root
spring.datasource.password=zl135781012
spring.datasource.driver-class-name=com.mysql.cj.jdbc.Driver

# 数据库连接测试配置
spring.datasource.hikari.connection-test-query=SELECT 1
spring.datasource.hikari.validation-timeout=3000

# =============================================
# 数据库连接池配置 (HikariCP)
# =============================================
spring.datasource.hikari.maximum-pool-size=20
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.connection-timeout=30000
spring.datasource.hikari.idle-timeout=600000
spring.datasource.hikari.max-lifetime=1800000
spring.datasource.hikari.leak-detection-threshold=60000
spring.datasource.hikari.pool-name=ShortURLProHikariPool

# =============================================
# JPA/Hibernate 配置
# =============================================
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=false
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.MySQLDialect
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.jdbc.batch_size=20
spring.jpa.properties.hibernate.order_inserts=true
spring.jpa.properties.hibernate.order_updates=true
spring.jpa.properties.hibernate.jdbc.batch_versioned_data=true

# 数据库初始化配置 - 允许应用启动时没有数据库
spring.jpa.defer-datasource-initialization=true
spring.sql.init.mode=never

# =============================================
# Web服务器配置
# =============================================
server.servlet.context-path=/
server.servlet.encoding.charset=UTF-8
server.servlet.encoding.enabled=true
server.servlet.encoding.force=true
server.error.include-message=always
server.error.include-binding-errors=always
server.compression.enabled=true
server.compression.mime-types=text/html,text/xml,text/plain,text/css,text/javascript,application/javascript,application/json
server.compression.min-response-size=1024

# =============================================
# Spring MVC 配置
# =============================================
spring.mvc.async.request-timeout=30000
spring.mvc.hiddenmethod.filter.enabled=true
spring.web.resources.cache.period=3600
spring.web.resources.chain.strategy.content.enabled=true
spring.web.resources.chain.strategy.content.paths=/**

# =============================================
# 日志配置
# =============================================
logging.level.root=INFO
logging.level.com.example.shorturlpro=DEBUG
logging.level.org.springframework.web=INFO
logging.level.org.springframework.security=INFO
logging.level.org.hibernate.SQL=WARN
logging.level.org.hibernate.type.descriptor.sql.BasicBinder=WARN
logging.level.org.hibernate.orm.deprecation=WARN
logging.pattern.console=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.pattern.file=%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] %-5level %logger{36} - %msg%n
logging.file.name=logs/shorturlpro.log
logging.logback.rollingpolicy.max-file-size=10MB
logging.logback.rollingpolicy.max-history=30

# =============================================
# 缓存配置
# =============================================
spring.cache.type=simple
spring.cache.cache-names=shortUrls,statistics

# =============================================
# Actuator 监控配置
# =============================================
management.endpoints.web.exposure.include=health,info,metrics,prometheus,logfile
management.endpoint.health.show-details=always
management.endpoint.metrics.enabled=true
management.server.port=8081
management.info.env.enabled=true
management.info.java.enabled=true
management.info.os.enabled=true

# =============================================
# 安全配置
# =============================================
spring.security.user.name=admin
spring.security.user.password=${ADMIN_PASSWORD:admin123}
spring.security.user.roles=ADMIN

# =============================================
# 开发工具配置
# =============================================
spring.devtools.restart.enabled=true
spring.devtools.livereload.enabled=true
spring.devtools.restart.additional-paths=src/main/resources

# =============================================
# Jackson JSON 配置
# =============================================
spring.jackson.serialization.write-dates-as-timestamps=false
spring.jackson.default-property-inclusion=NON_NULL
spring.jackson.time-zone=Asia/Shanghai

# =============================================
# 应用自定义配置
# =============================================
app.short-url.base-url=http://localhost:8080
app.short-url.code-length=6
app.short-url.max-custom-length=20
app.cache.expire-time=3600

# =============================================
# 自动配置排除 - 避免Redis相关警告
# =============================================
spring.autoconfigure.exclude=\
  org.springframework.boot.autoconfigure.data.redis.RedisAutoConfiguration,\
  org.springframework.boot.autoconfigure.data.redis.RedisReactiveAutoConfiguration,\
  org.springframework.boot.actuate.autoconfigure.redis.RedisReactiveHealthContributorAutoConfiguration,\
  org.springframework.boot.actuate.autoconfigure.redis.RedisHealthContributorAutoConfiguration

# =============================================
# 调试配置 - 帮助排查启动问题
# =============================================
logging.level.org.springframework.boot.autoconfigure=INFO
logging.level.com.zaxxer.hikari=INFO