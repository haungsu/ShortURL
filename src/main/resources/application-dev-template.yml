# ============================================
# ShortURLPro 开发环境配置 (application-dev.yml)
# ============================================

spring:
  # ============================================
  # 应用配置
  # ============================================
  application:
    name: ShortURLPro-Dev
  
  # ============================================
  # 数据库配置
  # ============================================
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/short_url_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai&allowPublicKeyRetrieval=true}
    username: ${MYSQL_USERNAME:root}
    password: ${MYSQL_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
    
    # HikariCP连接池配置 (开发环境较小规模)
    hikari:
      minimum-idle: 2
      maximum-pool-size: 10
      idle-timeout: 300000
      max-lifetime: 600000
      connection-timeout: 20000
      pool-name: HikariPool-Dev
  
  # ============================================
  # JPA/Hibernate配置
  # ============================================
  jpa:
    hibernate:
      ddl-auto: update  # 开发环境使用update模式，自动更新表结构
    show-sql: true      # 开发环境启用SQL输出，便于调试
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.MySQLDialect
  
  # ============================================
  # Redis配置
  # ============================================
  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      password: ${REDIS_PASSWORD:}
      database: 0
      timeout: 2000ms
      
      # 开发环境使用较小的连接池
      lettuce:
        pool:
          max-active: 8
          max-idle: 4
          min-idle: 1
          max-wait: 2000ms
  
  # ============================================
  # 缓存配置
  # ============================================
  cache:
    type: redis
    redis:
      time-to-live: 1800000  # 30分钟
      cache-null-values: false
  
  # ============================================
  # 安全配置
  # ============================================
  security:
    user:
      name: admin
      password: ${ADMIN_PASSWORD:admin123}
      roles: ADMIN

# ============================================
# 应用自定义配置
# ============================================
app:
  short-url:
    base-url: ${SHORT_URL_BASE_URL:http://localhost:8080}
    code-length: 6
    default-expire-days: 30

# ============================================
# 日志配置 (开发环境详细输出)
# ============================================
logging:
  level:
    root: INFO
    com.example.shorturlpro: DEBUG
    org.springframework.web: DEBUG
    org.hibernate.SQL: DEBUG
    org.hibernate.type.descriptor.sql.BasicBinder: TRACE
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} %highlight(%-5level) [%thread] %cyan(%logger{36}) - %msg%n"

# ============================================
# 监控配置 (开发环境)
# ============================================
# 开发环境暴露所有端点便于调试
management:
  endpoints:
    web:
      exposure:
        include: "*"
  endpoint:
    health:
      show-details: always
    env:
      show-values: always
  metrics:
    export:
      prometheus:
        enabled: true

# ============================================
# 开发工具配置
# ============================================
# 启用热部署（如已添加spring-boot-devtools）
spring.devtools.restart.enabled: true
spring.devtools.livereload.enabled: true

# ============================================
# 调试配置
# ============================================
# 启用更详细的错误信息
server:
  error:
    include-message: always
    include-binding-errors: always
    include-stacktrace: always
    include-exception: true
