# ============================================
# ShortURLPro 开发环境配置 (application.yml)
# ============================================
# 默认激活开发环境配置
# 生产环境请使用: java -jar -Dspring.profiles.active=prod xxx.jar
# 或注释掉下方的 spring.profiles.active=dev

# 激活开发环境配置
spring:
  profiles:
    active: dev

  application:
    name: ShortURLPro
  
  # ============================================
  # Web服务器配置
  # ============================================
  # 启用Gzip压缩
  compression:
    enabled: true
    mime-types: application/json,application/xml,text/html,text/xml,text/plain,text/css,application/javascript
    min-response-size: 1024

# ============================================
# 应用自定义配置
# ============================================
app:
  short-url:
    base-url: ${SHORT_URL_BASE_URL:http://localhost:8080}
    code-length: 6
    default-expire-days: 30

# ============================================
# 服务器配置
# ============================================
server:
  port: 8080
  # 错误处理配置
  error:
    include-message: on-param
    include-binding-errors: never
    include-stacktrace: never
    include-exception: false

# ============================================
# 日志配置
# ============================================
logging:
  level:
    root: WARN
    com.example.shorturlpro: INFO
    org.springframework.web: WARN
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss} %-5level %logger{36} - %msg%n"

# ============================================
# 管理端点配置
# ============================================
management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics,prometheus,logfile,caches
  endpoint:
    health:
      show-details: when-authorized
  metrics:
    export:
      prometheus:
        enabled: true
    distribution:
      percentiles-histogram:
        http:
          server:
            requests: true
    enable:
      all: true
    tags:
      application: ${spring.application.name}
    web:
      server:
        request:
          autotime:
            enabled: true
