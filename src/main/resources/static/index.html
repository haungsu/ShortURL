<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL短链生成器</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
  <h1 class="mb-4">URL短链生成器</h1>
  <div class="card">
    <div class="card-body">
      <form id="urlForm">
        <div class="mb-3">
          <label for="originalUrl" class="form-label">输入长URL:</label>
          <input type="url" class="form-control" id="originalUrl" required placeholder="https://example.com/very-long-url">
        </div>
        <button type="submit" class="btn btn-primary">生成短链</button>
      </form>
      <div id="result" class="mt-4" style="display: none;">
        <h5>生成的短链:</h5>
        <div class="input-group mb-3">
          <input type="text" class="form-control" id="shortUrl" readonly>
          <button class="btn btn-outline-secondary" type="button" id="copyBtn">复制</button>
        </div>
        <div class="alert alert-info">
          <small>提示: 您可以将此短链复制到浏览器地址栏中进行测试</small>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // 生成短链表单提交
  document.getElementById('urlForm').addEventListener('submit', async function(e) {
    e.preventDefault(); // 阻止表单默认提交
    const originalUrl = document.getElementById('originalUrl').value;
    try {
      const response = await fetch('/api/short-url/generate', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({
          originalUrl: originalUrl
        })
      });
      if (response.ok) {
        const data = await response.json();
        document.getElementById('shortUrl').value = data.shortUrl;
        document.getElementById('result').style.display = 'block';
      } else {
        alert('生成短链失败,请重试');
      }
    } catch (err) {
      alert('网络异常,请检查后端服务是否启动');
    }
  });

  // 复制短链接功能
  document.getElementById('copyBtn').addEventListener('click', function() {
    const shortUrlInput = document.getElementById('shortUrl');
    shortUrlInput.select();
    navigator.clipboard.writeText(shortUrlInput.value).then(() => {
      alert('已复制到剪贴板');
    }).catch(() => {
      // 兼容旧浏览器
      document.execCommand('copy');
      alert('已复制到剪贴板');
    });
  });
</script>
</body>
</html>
