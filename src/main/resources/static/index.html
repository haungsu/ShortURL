<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>URL短链生成器</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
  <h1 class="mb-4">URL短链生成器</h1>
  <div class="card">
    <div class="card-body">
      <!-- 普通用户登录模块 -->
      <div class="row mb-4 border-bottom pb-3">
        <div class="col-md-6">
          <h5>用户登录</h5>
          <form id="loginForm">
            <div class="mb-3">
              <label for="username" class="form-label">用户名:</label>
              <input type="text" class="form-control" id="username" required placeholder="user">
            </div>
            <div class="mb-3">
              <label for="password" class="form-label">密码:</label>
              <input type="password" class="form-control" id="password" required placeholder="123456">
            </div>
            <button type="submit" class="btn btn-success me-2" id="loginBtn">登录</button>
            <button type="button" class="btn btn-secondary" id="logoutBtn" disabled>退出登录</button>
          </form>
        </div>
        <div class="col-md-6">
          <h5>登录状态</h5>
          <div id="loginStatus" class="alert alert-secondary">
            未登录（用户：none，角色：none）
          </div>
          <div id="adminLink" class="mt-2" style="display: none;">
            <a href="/admin-manage.html" class="btn btn-primary">进入管理后台</a>
          </div>
        </div>
      </div>

      <!-- 短链生成模块 -->
      <form id="urlForm">
        <div class="mb-3">
          <label for="originalUrl" class="form-label">输入长URL:</label>
          <input type="url" class="form-control" id="originalUrl" required placeholder="https://example.com/very-long-url">
        </div>
        <button type="submit" class="btn btn-primary">生成短链</button>
      </form>

      <div id="result" class="mt-4" style="display: none;">
        <h5>生成的短链:</h5>
        <div class="input-group mb-3">
          <input type="text" class="form-control" id="shortUrl" readonly>
          <button class="btn btn-outline-secondary" type="button" id="copyBtn">复制</button>
        </div>
        <div class="alert alert-info">
          <small>提示: 您可以将此短链复制到浏览器地址栏中进行测试</small>
        </div>
      </div>
    </div>
  </div>
</div>

<script>
  // 全局变量：存储Token和用户信息
  let token = localStorage.getItem('jwtToken') || null;
  let userInfo = {
    username: 'none',
    role: 'none',
    nickname: 'none'
  };

  // 初始化：检查登录状态
  initLoginStatus();

  // ====== 登录相关方法 ======
  // 初始化登录状态
  function initLoginStatus() {
    if (token) {
      // 解析Token（前端简易解析，仅展示）
      try {
        const payload = JSON.parse(atob(token.split('.')[1]));
        userInfo.username = payload.sub;
        userInfo.role = payload.role;
        updateLoginStatus();
        document.getElementById('logoutBtn').removeAttribute('disabled');
      } catch (e) {
        // Token无效，清除
        logout();
      }
    } else {
      updateLoginStatus();
    }
  }

  // 更新登录状态展示
  function updateLoginStatus() {
    const statusEl = document.getElementById('loginStatus');
    const adminLink = document.getElementById('adminLink');

    statusEl.innerHTML = `当前用户：${userInfo.username}，角色：${userInfo.role.replace('ROLE_', '')}，昵称：${userInfo.nickname}`;

    // 根据角色显示不同的样式和管理后台链接
    if (userInfo.role === 'ROLE_ADMIN') {
      statusEl.className = 'alert alert-primary';
      adminLink.style.display = 'block';
    } else if (userInfo.role === 'ROLE_USER') {
      statusEl.className = 'alert alert-success';
      adminLink.style.display = 'none';
    } else {
      statusEl.className = 'alert alert-secondary';
      adminLink.style.display = 'none';
    }
  }

  // 登录表单提交
  document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;

    try {
      const response = await fetch('/api/auth/login', {
        method: 'POST',
        headers: {
          'Content-Type': 'application/json'
        },
        body: JSON.stringify({ username, password })
      });

      if (response.ok) {
        const data = await response.json();
        token = data.accessToken;
        localStorage.setItem('refreshToken', data.refreshToken);
        userInfo = {
          username: data.username,
          role: data.role,
          nickname: data.nickname
        };
        // 存储Token到本地
        localStorage.setItem('jwtToken', token);
        // 更新状态
        updateLoginStatus();
        document.getElementById('logoutBtn').removeAttribute('disabled');
        alert('登录成功！');
      } else {
        alert('用户名或密码错误！');
      }
    } catch (err) {
      alert('登录失败：网络异常，请检查后端服务！');
    }
  });

  // 退出登录
  document.getElementById('logoutBtn').addEventListener('click', function() {
    logout();
    alert('退出登录成功！');
  });

  // 退出登录逻辑
  function logout() {
    token = null;
    userInfo = { username: 'none', role: 'none', nickname: 'none' };
    localStorage.removeItem('jwtToken');
    localStorage.removeItem('refreshToken');
    localStorage.removeItem('username');
    localStorage.removeItem('role');
    localStorage.removeItem('nickname');
    updateLoginStatus();
    document.getElementById('logoutBtn').setAttribute('disabled', 'disabled');
  }

  // ====== 短链生成 ======
  document.getElementById('urlForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    const originalUrl = document.getElementById('originalUrl').value;

    // 构建请求头：携带Token（如果已登录）
    const headers = {
      'Content-Type': 'application/json'
    };
    // ========== 关键修改2：增加Token非空校验，避免携带undefined ==========
    if (token && token !== 'undefined') {
      headers['Authorization'] = `Bearer ${token}`;
    }

    try {
      const response = await fetch('/api/short-url/generate', {
        method: 'POST',
        headers: headers,
        body: JSON.stringify({ originalUrl: originalUrl })
      });

      if (response.ok) {
        const data = await response.json();
        document.getElementById('shortUrl').value = data.shortUrl;
        document.getElementById('result').style.display = 'block';
      } else {
        alert('生成短链失败,请重试');
      }
    } catch (err) {
      alert('网络异常,请检查后端服务是否启动');
    }
  });

  // ====== 复制短链接 ======
  document.getElementById('copyBtn').addEventListener('click', function() {
    const shortUrlInput = document.getElementById('shortUrl');
    shortUrlInput.select();
    navigator.clipboard.writeText(shortUrlInput.value).then(() => {
      alert('已复制到剪贴板');
    }).catch(() => {
      document.execCommand('copy');
      alert('已复制到剪贴板');
    });
  });
</script>
</body>
</html>
