<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4>管理员登录</h4>
                </div>
                <div class="card-body">
                    <form id="loginForm">
                        <div class="mb-3">
                            <label for="username" class="form-label">用户名</label>
                            <input type="text" class="form-control" id="username" name="username" required placeholder="admin">
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">密码</label>
                            <input type="password" class="form-control" id="password" name="password" required placeholder="123456">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">登录后台</button>
                    </form>
                    <div id="errorMessage" class="alert alert-danger mt-3" style="display: none;"></div>
                    <div id="successMessage" class="alert alert-success mt-3" style="display: none;"></div>
                </div>
            </div>
        </div>
    </div>
</div>
<script>
document.getElementById('loginForm').addEventListener('submit', async function(e) {
    e.preventDefault();
    
    const username = document.getElementById('username').value;
    const password = document.getElementById('password').value;
    const errorMessage = document.getElementById('errorMessage');
    const successMessage = document.getElementById('successMessage');
    
    // 清除之前的消息
    errorMessage.style.display = 'none';
    successMessage.style.display = 'none';
    
    try {
        const response = await fetch('/api/auth/login', {
            method: 'POST',
            headers: {
                'Content-Type': 'application/json'
            },
            body: JSON.stringify({ username, password })
        });
        
        const data = await response.json();
        
        if (response.ok) {
            // 登录成功，保存token到localStorage
            localStorage.setItem('jwtToken', data.accessToken);
            localStorage.setItem('refreshToken', data.refreshToken);
            localStorage.setItem('username', data.username);
            localStorage.setItem('role', data.role);
            localStorage.setItem('nickname', data.nickname);
            
            successMessage.textContent = '登录成功，正在跳转...';
            successMessage.style.display = 'block';
            
            // 延迟跳转到管理页面
            setTimeout(() => {
                window.location.href = '/admin-manage.html';
            }, 1000);
        } else {
            errorMessage.textContent = data.message || '登录失败';
            errorMessage.style.display = 'block';
        }
    } catch (error) {
        console.error('登录错误:', error);
        errorMessage.textContent = '网络错误，请稍后重试';
        errorMessage.style.display = 'block';
    }
});
</script>
</body>
</html>
