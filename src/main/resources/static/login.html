<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员登录</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>
<div class="container mt-5">
    <div class="row justify-content-center">
        <div class="col-md-6">
            <div class="card">
                <div class="card-header bg-primary text-white">
                    <h4>管理员登录</h4>
                </div>
                <div class="card-body">
                    <!-- 提交到Spring Security默认登录处理路径 -->
                    <form action="/login" method="post">
                        <div class="mb-3">
                            <label for="username" class="form-label">用户名</label>
                            <input type="text" class="form-control" id="username" name="username" required placeholder="admin">
                        </div>
                        <div class="mb-3">
                            <label for="password" class="form-label">密码</label>
                            <input type="password" class="form-control" id="password" name="password" required placeholder="123456">
                        </div>
                        <button type="submit" class="btn btn-primary w-100">登录后台</button>
                    </form>
                    <div th:if="${param.error}" class="alert alert-danger mt-3">
                        用户名或密码错误！
                    </div>
                    <div th:if="${param.logout}" class="alert alert-success mt-3">
                        已成功退出登录！
                    </div>
                </div>
            </div>
        </div>
    </div>
</div>
</body>
</html>
