<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>管理员短链管理系统</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/css/bootstrap.min.css" rel="stylesheet">
    <link href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css" rel="stylesheet">
    <style>
        body {
            background-color: #f8f9fa;
        }
        .admin-header {
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            color: white;
            padding: 1rem 0;
            margin-bottom: 2rem;
        }
        .admin-card {
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
            border: none;
            border-radius: 0.5rem;
        }
        .stats-card {
            background: linear-gradient(135deg, #4facfe 0%, #00f2fe 100%);
            color: white;
        }
        .table-container {
            background: white;
            border-radius: 0.5rem;
            overflow: hidden;
            box-shadow: 0 0.125rem 0.25rem rgba(0, 0, 0, 0.075);
        }
        .status-badge {
            font-size: 0.8rem;
            padding: 0.4rem 0.8rem;
        }
        .action-btn {
            margin: 0 0.2rem;
        }
        .search-box {
            background: white;
            border-radius: 0.5rem;
            padding: 1.5rem;
            margin-bottom: 1.5rem;
        }
    </style>
</head>
<body>
    <!-- 管理员头部 -->
    <div class="admin-header">
        <div class="container">
            <div class="row align-items-center">
                <div class="col-md-6">
                    <h2><i class="fas fa-crown me-2"></i>管理员短链管理系统</h2>
                    <p class="mb-0">全面掌控所有短链接的状态与数据</p>
                </div>
                <div class="col-md-6 text-end">
                    <div id="adminInfo" class="mb-2">
                        <span class="badge bg-light text-dark me-2">
                            <i class="fas fa-user-shield me-1"></i>管理员: <span id="currentAdmin">-</span>
                        </span>
                    </div>
                    <button class="btn btn-light btn-sm me-2" onclick="refreshData()">
                        <i class="fas fa-sync-alt me-1"></i>刷新数据
                    </button>
                    <button class="btn btn-warning btn-sm" onclick="logout()">
                        <i class="fas fa-sign-out-alt me-1"></i>退出登录
                    </button>
                </div>
            </div>
        </div>
    </div>

    <div class="container">
        <!-- 统计卡片 -->
        <div class="row mb-4">
            <div class="col-md-3">
                <div class="card stats-card admin-card">
                    <div class="card-body text-center">
                        <h3 class="card-title" id="totalCount">0</h3>
                        <p class="card-text"><i class="fas fa-link me-1"></i>总短链数</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stats-card admin-card">
                    <div class="card-body text-center">
                        <h3 class="card-title" id="enabledCount">0</h3>
                        <p class="card-text"><i class="fas fa-check-circle me-1"></i>启用中</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stats-card admin-card">
                    <div class="card-body text-center">
                        <h3 class="card-title" id="disabledCount">0</h3>
                        <p class="card-text"><i class="fas fa-times-circle me-1"></i>已禁用</p>
                    </div>
                </div>
            </div>
            <div class="col-md-3">
                <div class="card stats-card admin-card">
                    <div class="card-body text-center">
                        <h3 class="card-title" id="totalClicks">0</h3>
                        <p class="card-text"><i class="fas fa-mouse-pointer me-1"></i>总点击量</p>
                    </div>
                </div>
            </div>
        </div>

        <!-- 搜索和筛选区域 -->
        <div class="search-box">
            <div class="row">
                <div class="col-md-4">
                    <label class="form-label">搜索短链/原链接</label>
                    <input type="text" class="form-control" id="searchKeyword" placeholder="输入关键词搜索...">
                </div>
                <div class="col-md-3">
                    <label class="form-label">状态筛选</label>
                    <select class="form-select" id="statusFilter">
                        <option value="">全部状态</option>
                        <option value="ENABLED">启用</option>
                        <option value="DISABLED">禁用</option>
                    </select>
                </div>
                <div class="col-md-3">
                    <label class="form-label">排序方式</label>
                    <select class="form-select" id="sortOrder">
                        <option value="createdAt,desc">按创建时间倒序</option>
                        <option value="createdAt,asc">按创建时间正序</option>
                        <option value="clickCount,desc">按点击量倒序</option>
                        <option value="clickCount,asc">按点击量正序</option>
                    </select>
                </div>
                <div class="col-md-2 d-flex align-items-end">
                    <button class="btn btn-primary w-100" onclick="searchShortUrls()">
                        <i class="fas fa-search me-1"></i>搜索
                    </button>
                </div>
            </div>
        </div>

        <!-- 短链列表 -->
        <div class="table-container">
            <div class="card admin-card">
                <div class="card-header bg-white">
                    <div class="d-flex justify-content-between align-items-center">
                        <h5 class="mb-0"><i class="fas fa-list me-2"></i>短链列表</h5>
                        <div>
                            <button class="btn btn-success btn-sm me-2" onclick="showCreateModal()">
                                <i class="fas fa-plus me-1"></i>新建短链
                            </button>
                            <button class="btn btn-info btn-sm" onclick="exportData()">
                                <i class="fas fa-download me-1"></i>导出数据
                            </button>
                        </div>
                    </div>
                </div>
                <div class="card-body p-0">
                    <div class="table-responsive">
                        <table class="table table-hover mb-0">
                            <thead class="table-light">
                                <tr>
                                    <th>ID</th>
                                    <th>短链名称</th>
                                    <th>短码</th>
                                    <th>原链接</th>
                                    <th>状态</th>
                                    <th>点击量</th>
                                    <th>创建者</th>
                                    <th>创建时间</th>
                                    <th>操作</th>
                                </tr>
                            </thead>
                            <tbody id="shortUrlTableBody">
                                <tr>
                                    <td colspan="9" class="text-center py-4">
                                        <div class="spinner-border text-primary" role="status">
                                            <span class="visually-hidden">Loading...</span>
                                        </div>
                                        <p class="mt-2 mb-0">正在加载数据...</p>
                                    </td>
                                </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
                <div class="card-footer bg-white">
                    <nav>
                        <ul class="pagination justify-content-center mb-0" id="pagination">
                            <!-- 分页按钮将在这里动态生成 -->
                        </ul>
                    </nav>
                </div>
            </div>
        </div>
    </div>

    <!-- 编辑模态框 -->
    <div class="modal fade" id="editModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title" id="editModalTitle">编辑短链</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="editForm">
                        <input type="hidden" id="editId">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">短链名称 *</label>
                                    <input type="text" class="form-control" id="editName" required>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">短码 *</label>
                                    <input type="text" class="form-control" id="editShortCode" required>
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">原链接 *</label>
                            <input type="url" class="form-control" id="editOriginalUrl" required>
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">状态</label>
                                    <select class="form-select" id="editStatus">
                                        <option value="ENABLED">启用</option>
                                        <option value="DISABLED">禁用</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">过期时间</label>
                                    <input type="datetime-local" class="form-control" id="editExpiresAt">
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">应用ID</label>
                            <input type="text" class="form-control" id="editAppId">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-primary" onclick="saveChanges()">保存修改</button>
                </div>
            </div>
        </div>
    </div>

    <!-- 创建模态框 -->
    <div class="modal fade" id="createModal" tabindex="-1">
        <div class="modal-dialog modal-lg">
            <div class="modal-content">
                <div class="modal-header">
                    <h5 class="modal-title">创建新短链</h5>
                    <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
                </div>
                <div class="modal-body">
                    <form id="createForm">
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">短链名称 *</label>
                                    <input type="text" class="form-control" id="createName" required placeholder="例如：官网首页">
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">短码</label>
                                    <input type="text" class="form-control" id="createShortCode" placeholder="留空则自动生成">
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">原链接 *</label>
                            <input type="url" class="form-control" id="createOriginalUrl" required placeholder="https://example.com">
                        </div>
                        <div class="row">
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">状态</label>
                                    <select class="form-select" id="createStatus">
                                        <option value="ENABLED" selected>启用</option>
                                        <option value="DISABLED">禁用</option>
                                    </select>
                                </div>
                            </div>
                            <div class="col-md-6">
                                <div class="mb-3">
                                    <label class="form-label">过期时间</label>
                                    <input type="datetime-local" class="form-control" id="createExpiresAt">
                                </div>
                            </div>
                        </div>
                        <div class="mb-3">
                            <label class="form-label">应用ID</label>
                            <input type="text" class="form-control" id="createAppId" placeholder="可选">
                        </div>
                    </form>
                </div>
                <div class="modal-footer">
                    <button type="button" class="btn btn-secondary" data-bs-dismiss="modal">取消</button>
                    <button type="button" class="btn btn-success" onclick="createShortUrl()">创建短链</button>
                </div>
            </div>
        </div>
    </div>

    <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.1.3/dist/js/bootstrap.bundle.min.js"></script>
    <script>
        // 全局变量
        let token = localStorage.getItem('jwtToken') || null;
        let currentPage = 0;
        let pageSize = 10;
        let totalPages = 0;

        // 页面加载完成后初始化
        document.addEventListener('DOMContentLoaded', function() {
            checkAdminAuth();
            loadStatistics();
            loadShortUrls();
            
            // 绑定搜索事件
            document.getElementById('searchKeyword').addEventListener('keypress', function(e) {
                if (e.key === 'Enter') {
                    searchShortUrls();
                }
            });
        });

        // 检查管理员权限
        function checkAdminAuth() {
            if (!token) {
                alert('请先登录！');
                window.location.href = '/login.html';
                return;
            }

            // 验证Token并检查是否为管理员
            fetch('/api/auth/validate', {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            })
            .then(response => response.json())
            .then(data => {
                if (!data.valid) {
                    alert('Token无效，请重新登录！');
                    localStorage.removeItem('jwtToken');
                    window.location.href = '/login.html';
                    return;
                }
                
                if (data.role !== 'ROLE_ADMIN') {
                    alert('权限不足！需要管理员权限。');
                    window.location.href = '/index.html';
                    return;
                }
                
                document.getElementById('currentAdmin').textContent = data.username;
            })
            .catch(error => {
                console.error('权限验证失败:', error);
                alert('权限验证失败，请重新登录！');
                localStorage.removeItem('jwtToken');
                window.location.href = '/login.html';
            });
        }

        // 加载统计数据
        function loadStatistics() {
            fetch('/api/short-url/stats', {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            })
            .then(response => response.json())
            .then(data => {
                document.getElementById('totalCount').textContent = data.totalCount || 0;
                document.getElementById('enabledCount').textContent = data.enabledCount || 0;
                document.getElementById('disabledCount').textContent = data.disabledCount || 0;
                document.getElementById('totalClicks').textContent = data.totalClicks || 0;
            })
            .catch(error => console.error('加载统计数据失败:', error));
        }

        // 加载短链列表
        function loadShortUrls(page = 0, search = '', status = '', sort = 'createdAt,desc') {
            const url = `/api/short-url/admin/list?page=${page}&size=${pageSize}&search=${encodeURIComponent(search)}&status=${status}&sort=${sort}`;
            
            fetch(url, {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            })
            .then(response => response.json())
            .then(data => {
                renderShortUrlTable(data.content || []);
                renderPagination(data);
                currentPage = data.number || 0;
                totalPages = data.totalPages || 0;
            })
            .catch(error => {
                console.error('加载短链列表失败:', error);
                document.getElementById('shortUrlTableBody').innerHTML = `
                    <tr>
                        <td colspan="9" class="text-center text-danger py-4">
                            <i class="fas fa-exclamation-triangle me-2"></i>加载数据失败
                        </td>
                    </tr>
                `;
            });
        }

        // 渲染短链表格
        function renderShortUrlTable(shortUrls) {
            const tbody = document.getElementById('shortUrlTableBody');
            
            if (!shortUrls || shortUrls.length === 0) {
                tbody.innerHTML = `
                    <tr>
                        <td colspan="9" class="text-center py-4">
                            <i class="fas fa-inbox me-2"></i>暂无数据
                        </td>
                    </tr>
                `;
                return;
            }

            tbody.innerHTML = shortUrls.map(url => `
                <tr>
                    <td>${url.id}</td>
                    <td>${url.name || '-'}</td>
                    <td>
                        <code>${url.shortCode}</code>
                        <button class="btn btn-sm btn-outline-primary action-btn" 
                                onclick="copyToClipboard('${window.location.origin}/${url.shortCode}')"
                                title="复制短链">
                            <i class="fas fa-copy"></i>
                        </button>
                    </td>
                    <td>
                        <div class="text-truncate" style="max-width: 200px;" title="${url.originalUrl}">
                            ${url.originalUrl}
                        </div>
                    </td>
                    <td>
                        <span class="badge ${url.status === 'ENABLED' ? 'bg-success' : 'bg-danger'} status-badge">
                            ${url.status === 'ENABLED' ? '启用' : '禁用'}
                        </span>
                    </td>
                    <td>${url.clickCount || 0}</td>
                    <td>${url.userId ? `用户${url.userId}` : '匿名'}</td>
                    <td>${formatDate(url.createdAt)}</td>
                    <td>
                        <button class="btn btn-sm btn-primary action-btn" 
                                onclick="showEditModal(${JSON.stringify(url).replace(/"/g, '&quot;')})"
                                title="编辑">
                            <i class="fas fa-edit"></i>
                        </button>
                        <button class="btn btn-sm btn-${url.status === 'ENABLED' ? 'warning' : 'success'} action-btn" 
                                onclick="toggleStatus(${url.id}, '${url.status}')"
                                title="${url.status === 'ENABLED' ? '禁用' : '启用'}">
                            <i class="fas fa-${url.status === 'ENABLED' ? 'ban' : 'check'}"></i>
                        </button>
                        <button class="btn btn-sm btn-danger action-btn" 
                                onclick="deleteShortUrl(${url.id})"
                                title="删除">
                            <i class="fas fa-trash"></i>
                        </button>
                    </td>
                </tr>
            `).join('');
        }

        // 渲染分页
        function renderPagination(data) {
            const pagination = document.getElementById('pagination');
            const currentPage = data.number || 0;
            const totalPages = data.totalPages || 0;
            
            let html = '';
            
            // 上一页
            if (currentPage > 0) {
                html += `<li class="page-item"><a class="page-link" href="#" onclick="loadShortUrls(${currentPage - 1})">上一页</a></li>`;
            }
            
            // 页码
            for (let i = Math.max(0, currentPage - 2); i <= Math.min(totalPages - 1, currentPage + 2); i++) {
                html += `<li class="page-item ${i === currentPage ? 'active' : ''}">
                            <a class="page-link" href="#" onclick="loadShortUrls(${i})">${i + 1}</a>
                         </li>`;
            }
            
            // 下一页
            if (currentPage < totalPages - 1) {
                html += `<li class="page-item"><a class="page-link" href="#" onclick="loadShortUrls(${currentPage + 1})">下一页</a></li>`;
            }
            
            pagination.innerHTML = html;
        }

        // 显示编辑模态框
        function showEditModal(shortUrl) {
            document.getElementById('editId').value = shortUrl.id;
            document.getElementById('editName').value = shortUrl.name || '';
            document.getElementById('editShortCode').value = shortUrl.shortCode;
            document.getElementById('editOriginalUrl').value = shortUrl.originalUrl;
            document.getElementById('editStatus').value = shortUrl.status;
            document.getElementById('editAppId').value = shortUrl.appId || '';
            
            // 处理过期时间
            if (shortUrl.expiresAt) {
                const expiresDate = new Date(shortUrl.expiresAt);
                document.getElementById('editExpiresAt').value = expiresDate.toISOString().slice(0, 16);
            } else {
                document.getElementById('editExpiresAt').value = '';
            }
            
            document.getElementById('editModalTitle').textContent = `编辑短链 - ${shortUrl.shortCode}`;
            new bootstrap.Modal(document.getElementById('editModal')).show();
        }

        // 保存修改
        function saveChanges() {
            const id = document.getElementById('editId').value;
            const formData = {
                name: document.getElementById('editName').value,
                shortCode: document.getElementById('editShortCode').value,
                originalUrl: document.getElementById('editOriginalUrl').value,
                status: document.getElementById('editStatus').value,
                appId: document.getElementById('editAppId').value,
                expiresAt: document.getElementById('editExpiresAt').value || null
            };

            fetch(`/api/short-url/admin/${id}`, {
                method: 'PUT',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(formData)
            })
            .then(response => {
                if (response.ok) {
                    alert('修改成功！');
                    bootstrap.Modal.getInstance(document.getElementById('editModal')).hide();
                    loadShortUrls(currentPage);
                    loadStatistics();
                } else {
                    return response.json().then(data => {
                        throw new Error(data.message || '修改失败');
                    });
                }
            })
            .catch(error => {
                alert('修改失败：' + error.message);
            });
        }

        // 显示创建模态框
        function showCreateModal() {
            document.getElementById('createForm').reset();
            new bootstrap.Modal(document.getElementById('createModal')).show();
        }

        // 创建短链
        function createShortUrl() {
            const formData = {
                name: document.getElementById('createName').value,
                shortCode: document.getElementById('createShortCode').value || undefined,
                originalUrl: document.getElementById('createOriginalUrl').value,
                status: document.getElementById('createStatus').value,
                appId: document.getElementById('createAppId').value || undefined,
                expiresAt: document.getElementById('createExpiresAt').value || undefined
            };

            fetch('/api/short-url', {
                method: 'POST',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify(formData)
            })
            .then(response => {
                if (response.ok) {
                    return response.json();
                } else {
                    return response.json().then(data => {
                        throw new Error(data.message || '创建失败');
                    });
                }
            })
            .then(data => {
                alert(`创建成功！短链：${data.shortUrl}`);
                bootstrap.Modal.getInstance(document.getElementById('createModal')).hide();
                loadShortUrls(currentPage);
                loadStatistics();
            })
            .catch(error => {
                alert('创建失败：' + error.message);
            });
        }

        // 切换状态
        function toggleStatus(id, currentStatus) {
            const newStatus = currentStatus === 'ENABLED' ? 'DISABLED' : 'ENABLED';
            const action = newStatus === 'ENABLED' ? '启用' : '禁用';
            
            if (!confirm(`确定要${action}这个短链吗？`)) {
                return;
            }

            fetch(`/api/short-url/status/${id}`, {
                method: 'PATCH',
                headers: {
                    'Content-Type': 'application/json',
                    'Authorization': `Bearer ${token}`
                },
                body: JSON.stringify({ status: newStatus })
            })
            .then(response => {
                if (response.ok) {
                    alert(`${action}成功！`);
                    loadShortUrls(currentPage);
                    loadStatistics();
                } else {
                    return response.json().then(data => {
                        throw new Error(data.message || `${action}失败`);
                    });
                }
            })
            .catch(error => {
                alert(`${action}失败：` + error.message);
            });
        }

        // 删除短链
        function deleteShortUrl(id) {
            if (!confirm('确定要删除这个短链吗？此操作不可恢复！')) {
                return;
            }

            fetch(`/api/short-url/admin/${id}`, {
                method: 'DELETE',
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            })
            .then(response => {
                if (response.ok) {
                    alert('删除成功！');
                    loadShortUrls(currentPage);
                    loadStatistics();
                } else {
                    return response.json().then(data => {
                        throw new Error(data.message || '删除失败');
                    });
                }
            })
            .catch(error => {
                alert('删除失败：' + error.message);
            });
        }

        // 搜索功能
        function searchShortUrls() {
            const keyword = document.getElementById('searchKeyword').value;
            const status = document.getElementById('statusFilter').value;
            const sort = document.getElementById('sortOrder').value;
            loadShortUrls(0, keyword, status, sort);
        }

        // 刷新数据
        function refreshData() {
            loadStatistics();
            loadShortUrls(currentPage);
        }

        // 导出数据
        function exportData() {
            const keyword = document.getElementById('searchKeyword').value;
            const status = document.getElementById('statusFilter').value;
            
            const url = `/api/short-url/admin/export?search=${encodeURIComponent(keyword)}&status=${status}`;
            
            fetch(url, {
                headers: {
                    'Authorization': `Bearer ${token}`
                }
            })
            .then(response => {
                if (response.ok) {
                    return response.blob();
                } else {
                    throw new Error('导出失败');
                }
            })
            .then(blob => {
                const url = window.URL.createObjectURL(blob);
                const a = document.createElement('a');
                a.href = url;
                a.download = `shorturls_${new Date().toISOString().slice(0, 10)}.xlsx`;
                document.body.appendChild(a);
                a.click();
                window.URL.revokeObjectURL(url);
                document.body.removeChild(a);
                alert('导出成功！');
            })
            .catch(error => {
                alert('导出失败：' + error.message);
            });
        }

        // 复制到剪贴板
        function copyToClipboard(text) {
            navigator.clipboard.writeText(text).then(() => {
                alert('已复制到剪贴板：' + text);
            }).catch(() => {
                const textArea = document.createElement('textarea');
                textArea.value = text;
                document.body.appendChild(textArea);
                textArea.select();
                document.execCommand('copy');
                document.body.removeChild(textArea);
                alert('已复制到剪贴板：' + text);
            });
        }

        // 退出登录
        function logout() {
            localStorage.removeItem('jwtToken');
            localStorage.removeItem('refreshToken');
            localStorage.removeItem('username');
            localStorage.removeItem('role');
            localStorage.removeItem('nickname');
            alert('退出登录成功！');
            window.location.href = '/index.html';
        }

        // 格式化日期
        function formatDate(dateString) {
            if (!dateString) return '-';
            const date = new Date(dateString);
            return date.toLocaleString('zh-CN');
        }

        // 实时搜索（防抖）
        let searchTimeout;
        document.getElementById('searchKeyword').addEventListener('input', function() {
            clearTimeout(searchTimeout);
            searchTimeout = setTimeout(() => {
                searchShortUrls();
            }, 500);
        });

        document.getElementById('statusFilter').addEventListener('change', searchShortUrls);
        document.getElementById('sortOrder').addEventListener('change', searchShortUrls);
    </script>
</body>
</html>
