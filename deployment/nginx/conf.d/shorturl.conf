# ShortURLPro 主站点配置
# HTTP和HTTPS反向代理配置

# HTTP服务器（重定向到HTTPS）
server {
    listen 80;
    server_name localhost shorturl.example.com;
    return 301 https://$server_name$request_uri;
}

# HTTPS服务器
server {
    listen 443 ssl http2;
    server_name localhost shorturl.example.com;

    # SSL证书配置
    ssl_certificate /etc/nginx/ssl/fullchain.pem;
    ssl_certificate_key /etc/nginx/ssl/privkey.pem;
    
    # SSL安全配置
    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-RSA-AES128-GCM-SHA256:ECDHE-RSA-AES256-GCM-SHA384:ECDHE-RSA-AES128-SHA256:ECDHE-RSA-AES256-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 10m;
    ssl_stapling on;
    ssl_stapling_verify on;

    # 安全头配置
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options "SAMEORIGIN" always;
    add_header X-Content-Type-Options "nosniff" always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    # 日志配置
    access_log /var/log/nginx/shorturl.access.log main;
    error_log /var/log/nginx/shorturl.error.log;

    # 客户端大小限制
    client_max_body_size 10m;

    # 前端静态资源服务
    location / {
        root /app/vue/dist;
        try_files $uri $uri/ /index.html;
        
        # 静态资源缓存优化
        location ~* \.(js|css|png|jpg|jpeg|gif|ico|svg|woff|woff2|ttf|eot)$ {
            expires 1y;
            add_header Cache-Control "public, immutable";
            add_header Vary Accept-Encoding;
        }
    }

    # API接口代理（不缓存）
    location /api/ {
        proxy_pass http://shorturl_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 禁用缓存
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
        
        # 超时设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }
    
    # 管理员界面路由处理
    location /admin {
        root /app/vue/dist;
        try_files $uri $uri/ /index.html;
    }

    # 短链接跳转（高性能配置）
    location ~ ^/[a-zA-Z0-9]{6,10}$ {
        proxy_pass http://shorturl_redirect;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 高性能设置
        proxy_buffering off;
        proxy_cache_valid 200 1h;
        proxy_cache_valid 404 1m;
        proxy_cache_use_stale error timeout updating http_500 http_502 http_503 http_504;
        
        # 快速失败设置
        proxy_next_upstream error timeout invalid_header http_500 http_502 http_503 http_504;
        proxy_next_upstream_tries 3;
        proxy_next_upstream_timeout 10s;
    }

    # 静态资源缓存
    location ~* \.(jpg|jpeg|png|gif|ico|css|js|woff|woff2|ttf|svg)$ {
        proxy_pass http://shorturl_backend;
        expires 1y;
        add_header Cache-Control "public, immutable";
        add_header Vary Accept-Encoding;
    }

    # 健康检查端点
    location /health {
        access_log off;
        proxy_pass http://shorturl_backend/actuator/health;
        proxy_set_header Host $host;
    }

    # 监控端点（需要认证）
    location /metrics {
        access_log off;
        proxy_pass http://shorturl_backend/actuator/prometheus;
        proxy_set_header Host $host;
        # 可以在这里添加基本认证
        # auth_basic "Metrics Access";
        # auth_basic_user_file /etc/nginx/.htpasswd;
    }

    # 禁止访问敏感文件
    location ~ /\. {
        deny all;
        access_log off;
        log_not_found off;
    }

    location ~ \.(sql|log|env)$ {
        deny all;
        access_log off;
        log_not_found off;
    }
}

# 上游服务器配置
upstream shorturl_backend {
    # 负载均衡配置
    least_conn;
    
    # 应用服务器实例
    server short-url-app:8080 max_fails=3 fail_timeout=30s;
    
    # 可以添加更多实例实现负载均衡
    # server short-url-app-2:8080 max_fails=3 fail_timeout=30s;
    # server short-url-app-3:8080 max_fails=3 fail_timeout=30s;
    
    # 健康检查
    keepalive 32;
}

upstream shorturl_redirect {
    # 专门用于短链接跳转的上游（高性能）
    ip_hash;
    server short-url-app:8080 max_fails=2 fail_timeout=10s;
    keepalive 64;
}