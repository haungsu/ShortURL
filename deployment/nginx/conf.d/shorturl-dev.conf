# ShortURLPro 开发环境HTTP配置
# 不包含SSL，适用于本地开发和测试

server {
    listen 80;
    server_name localhost 127.0.0.1;

    # 日志配置
    access_log /var/log/nginx/shorturl-dev.access.log main;
    error_log /var/log/nginx/shorturl-dev.error.log;

    # 客户端大小限制
    client_max_body_size 10m;

    # 主要代理配置
    location / {
        proxy_pass http://shorturl_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 开发环境宽松设置
        proxy_connect_timeout 60s;
        proxy_send_timeout 60s;
        proxy_read_timeout 60s;
    }

    # API接口
    location /api/ {
        proxy_pass http://shorturl_backend;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 禁用缓存便于调试
        expires -1;
        add_header Cache-Control "no-cache, no-store, must-revalidate";
    }

    # 短链接跳转
    location ~ ^/[a-zA-Z0-9]{6,10}$ {
        proxy_pass http://shorturl_redirect;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        
        # 开发环境设置
        proxy_buffering off;
    }

    # 静态资源
    location ~* \.(jpg|jpeg|png|gif|ico|css|js)$ {
        proxy_pass http://shorturl_backend;
        expires 1d;
        add_header Cache-Control "public";
    }

    # 健康检查
    location /health {
        access_log off;
        proxy_pass http://shorturl_backend/actuator/health;
    }

    # 监控端点
    location /metrics {
        access_log off;
        proxy_pass http://shorturl_backend/actuator/prometheus;
    }
}

# 上游服务器配置
upstream shorturl_backend {
    server short-url-app:8080 max_fails=3 fail_timeout=30s;
    keepalive 16;
}

upstream shorturl_redirect {
    ip_hash;
    server short-url-app:8080 max_fails=2 fail_timeout=10s;
    keepalive 32;
}