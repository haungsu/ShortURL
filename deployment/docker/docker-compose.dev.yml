version: '3.8'

services:
  # Nginx反向代理（开发环境 - HTTP only）
  nginx-dev:
    image: nginx:alpine
    container_name: short-url-nginx-dev
    restart: always
    ports:
      - "80:80"
    volumes:
      - ./nginx/nginx.conf:/etc/nginx/nginx.conf:ro
      - ./nginx/conf.d/shorturl-dev.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/logs:/var/log/nginx
    depends_on:
      - short-url-app
    networks:
      - shorturl-network
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost"]
      interval: 30s
      timeout: 10s
      retries: 3

  # Spring Boot 应用
  short-url-app:
    image: lattt/short-url-pro:0.0.1  # 或使用本地构建
    container_name: short-url-pro-dev
    restart: always
    environment:
      - SPRING_PROFILES_ACTIVE=dev
      - SPRING_DATASOURCE_URL=jdbc:mysql://mysql:3306/short_url_db?useUnicode=true&characterEncoding=utf8&useSSL=false&serverTimezone=Asia/Shanghai
      - SPRING_DATASOURCE_USERNAME=root
      - SPRING_DATASOURCE_PASSWORD=123456
      - SPRING_REDIS_HOST=redis
      - SPRING_REDIS_PORT=6379
      - SERVER_FORWARD_HEADERS_STRATEGY=NATIVE
      # JVM 内存限制（开发环境）
      - JAVA_OPTS=-Xms256m -Xmx512m -XX:+UseG1GC -XX:MaxGCPauseMillis=200
    depends_on:
      mysql:
        condition: service_healthy
      redis:
        condition: service_healthy
    volumes:
      - short-url-app-logs:/app/logs
    networks:
      - shorturl-network
    # 容器资源限制
    deploy:
      resources:
        limits:
          cpus: '1.0'
          memory: 768M

  # MySQL数据库
  mysql:
    image: mysql:8.0
    container_name: short-url-mysql-dev
    restart: always
    environment:
      - MYSQL_ROOT_PASSWORD=123456
      - MYSQL_DATABASE=short_url_db
      - MYSQL_CHARACTER_SET_SERVER=utf8mb4
      - MYSQL_COLLATION_SERVER=utf8mb4_unicode_ci
    ports:
      - "3306:3306"
    volumes:
      - short-url-mysql-data-dev:/var/lib/mysql
    networks:
      - shorturl-network
    healthcheck:
      test: ["CMD", "mysqladmin", "ping", "-h", "localhost", "-u", "root", "-p123456"]
      interval: 30s
      timeout: 10s
      retries: 5

  # Redis缓存
  redis:
    image: redis:7-alpine
    container_name: short-url-redis-dev
    restart: always
    ports:
      - "6379:6379"
    command: redis-server --appendonly yes
    volumes:
      - short-url-redis-data-dev:/data
    networks:
      - shorturl-network
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 3

networks:
  shorturl-network:
    driver: bridge

volumes:
  short-url-mysql-data-dev:
  short-url-redis-data-dev:
  short-url-app-logs: