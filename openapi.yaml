openapi: 3.0.3
info:
  title: ShortURL Pro API
  description: |
    ShortURL Pro 是一个基于 Spring Boot 的短链接服务系统，支持链接缩短、访问统计、用户管理等功能。
    
    ## 📋 接口规范
    - **统一响应格式**：所有接口返回统一的 ApiResponse 包装结构
    - **认证机制**：JWT Token 认证（RS256算法）
    - **权限控制**：基于角色的访问控制（RBAC）
    
    ## 🔐 访问权限分类
    - **🔓 公开接口**：短链接生成、跳转（无需认证）
    - **🔐 认证接口**：用户登录、Token刷新（无需认证）
    - **👨‍💼 管理员接口**：需要 ROLE_ADMIN 角色
    
    ## 🎯 核心功能
    - 🔗 短链接生成：将长URL转换为6位Base62短码
    - 🔄 302跳转：根据短码重定向到原始链接
    - 📊 访问统计：实时记录点击次数
    - 🔐 用户管理：基于Spring Security的权限控制
    - 🛠️ 管理功能：启用/禁用短链接状态
    
    ## 📡 统一响应格式
    ```json
    {
      "code": 200,
      "message": "操作成功",
      "data": {},
      "timestamp": 1703123456789
    }
    ```
  version: 1.0.0
  contact:
    name: ShortURL Pro Team
    email: support@shorturlpro.com
  license:
    name: MIT
    url: https://opensource.org/licenses/MIT

servers:
  - url: http://localhost:8080
    description: 开发环境
  - url: https://api.shorturlpro.com
    description: 生产环境

tags:
  - name: 短链接服务
    description: 短链接生成与跳转相关接口
  - name: 管理接口
    description: 短链接管理相关接口
  - name: 认证接口
    description: 用户认证相关接口

paths:
  # 公开接口 - 短链接生成
  /api/short-url/generate:
    post:
      tags:
        - 短链接服务
      summary: 生成短链接
      description: |
        将原始长链接转换为短链接
        
        **权限要求**：公开接口，无需认证
        **请求频率限制**：每分钟最多100次请求
      operationId: generateShortUrl
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShortUrlGenerateRequest'
            examples:
              basic:
                summary: 基础请求
                value:
                  originalUrl: "https://www.example.com/very/long/url/that/needs/to/be/shortened"
              withAppId:
                summary: 带应用标识
                value:
                  originalUrl: "https://www.example.com/very/long/url/that/needs/to/be/shortened"
                  appId: "myapp"
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                originalUrl:
                  type: string
                  description: 原始长链接，必须以 http:// 或 https:// 开头
                  format: uri
                  example: https://www.example.com/very/long/url/that/needs/to/be/shortened
                appId:
                  type: string
                  description: 应用标识（可选），用于区分不同应用的短链接
                  maxLength: 50
                  example: myapp
              required:
                - originalUrl
      responses:
        '200':
          description: 短链接生成成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiResponseShortUrlGenerateResponse'
              examples:
                success:
                  summary: 生成成功
                  value:
                    code: 200
                    message: "success"
                    data:
                      shortCode: "abc123xyz"
                      shortUrl: "http://localhost:8080/abc123xyz"
                    timestamp: 1703123456789
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                invalidUrl:
                  summary: URL格式错误
                  value:
                    code: 400
                    message: "原始链接格式不正确，请以http://或https://开头"
                    data: null
                    timestamp: 1703123456789
        '500':
          description: 服务器内部错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
              examples:
                serverError:
                  summary: 服务器错误
                  value:
                    code: 500
                    message: "服务器内部错误：生成唯一短码失败，请稍后重试"
                    data: null
                    timestamp: 1703123456789

  # 公开接口 - 短链接跳转
  /{shortCode}:
    get:
      tags:
        - 短链接服务
      summary: 短链接跳转
      description: |
        根据短码进行302重定向到原始链接，并更新访问统计
        
        **权限要求**：公开接口，无需认证
      operationId: redirectToOriginalUrl
      parameters:
        - name: shortCode
          in: path
          required: true
          schema:
            type: string
            minLength: 1
            maxLength: 20
            pattern: '^[a-zA-Z0-9]+$'
          description: 短链接码
          example: abc123xyz
      responses:
        '302':
          description: 重定向到原始链接
          headers:
            Location:
              description: 原始链接地址
              schema:
                type: string
                format: uri
        '404':
          description: 短链接不存在或已被禁用
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '500':
          description: 服务器内部错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  # 管理接口 - 短链接详情查询
  /api/short-url/detail/{shortCode}:
    get:
      tags:
        - 管理接口
      summary: 查询短链接详情
      description: |
        根据短码查询短链接的详细信息
        
        **权限要求**：需要认证
      operationId: getShortUrlDetail
      parameters:
        - name: shortCode
          in: path
          required: true
          schema:
            type: string
          description: 短链接码
          example: abc123xyz
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShortUrlResponse'
        '401':
          description: 未认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: 短链接不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  # 管理接口 - 短链接列表查询
  /api/short-url/list:
    get:
      tags:
        - 管理接口
      summary: 查询短链接列表
      description: |
        分页查询短链接列表，支持按名称搜索
        
        **权限要求**：需要认证
      operationId: getShortUrlList
      parameters:
        - name: name
          in: query
          required: false
          schema:
            type: string
          description: 短链接名称搜索关键词
          example: my link
        - name: page
          in: query
          required: false
          schema:
            type: integer
            minimum: 0
            default: 0
          description: 页码（从0开始）
        - name: size
          in: query
          required: false
          schema:
            type: integer
            minimum: 1
            maximum: 100
            default: 10
          description: 每页大小
      responses:
        '200':
          description: 查询成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  content:
                    type: array
                    items:
                      $ref: '#/components/schemas/ShortUrlResponse'
                  totalPages:
                    type: integer
                  totalElements:
                    type: integer
                  size:
                    type: integer
                  number:
                    type: integer
        '401':
          description: 未认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  # 管理接口 - 创建短链接
  /api/short-url:
    post:
      tags:
        - 管理接口
      summary: 创建短链接
      description: |
        创建新的短链接记录
        
        **权限要求**：需要认证
      operationId: createShortUrl
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShortUrlCreateRequest'
      responses:
        '201':
          description: 创建成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShortUrlResponse'
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '401':
          description: 未认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  # 管理接口 - 更新短链接
  /api/short-url/{id}:
    put:
      tags:
        - 管理接口
      summary: 更新短链接
      description: |
        根据ID更新短链接信息
        
        **权限要求**：需要认证
      operationId: updateShortUrl
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: 短链接ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: '#/components/schemas/ShortUrlCreateRequest'
      responses:
        '200':
          description: 更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShortUrlResponse'
        '400':
          description: 请求参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '401':
          description: 未认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: 短链接不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  # 管理接口 - 删除短链接
  /api/short-url/{id}:
    delete:
      tags:
        - 管理接口
      summary: 删除短链接
      description: |
        根据ID删除短链接记录
        
        **权限要求**：需要认证
      operationId: deleteShortUrl
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: 短链接ID
      responses:
        '204':
          description: 删除成功
        '401':
          description: 未认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: 短链接不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  # 管理接口 - 更新短链接状态
  /api/short-url/status/{id}:
    patch:
      tags:
        - 管理接口
      summary: 更新短链接状态
      description: |
        更新短链接的状态（启用/禁用）
        
        **权限要求**：需要认证
      operationId: updateShortUrlStatus
      parameters:
        - name: id
          in: path
          required: true
          schema:
            type: integer
            format: int64
          description: 短链接ID
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              properties:
                status:
                  type: string
                  enum: [ENABLED, DISABLED]
                  description: 目标状态
              required:
                - status
      responses:
        '200':
          description: 状态更新成功
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ShortUrlResponse'
        '400':
          description: 状态参数错误
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '401':
          description: 未认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'
        '404':
          description: 短链接不存在
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  # 管理接口 - 系统统计
  /api/short-url/stats:
    get:
      tags:
        - 管理接口
      summary: 获取系统统计信息
      description: |
        获取系统的总体统计信息
        
        **权限要求**：需要认证
      operationId: getSystemStats
      responses:
        '200':
          description: 统计信息获取成功
          content:
            application/json:
              schema:
                type: object
                properties:
                  totalLinks:
                    type: integer
                    description: 总短链接数
                  activeLinks:
                    type: integer
                    description: 启用的短链接数
                  totalClicks:
                    type: integer
                    description: 总点击次数
                  todayClicks:
                    type: integer
                    description: 今日点击次数
        '401':
          description: 未认证
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  # 认证接口 - 登录
  /login:
    get:
      tags:
        - 认证接口
      summary: 登录页面
      description: |
        显示登录页面
        
        **权限要求**：公开接口
      operationId: showLoginPage
      responses:
        '200':
          description: 登录页面
          content:
            text/html:
              schema:
                type: string

    post:
      tags:
        - 认证接口
      summary: 用户登录
      description: |
        用户登录认证
        
        **权限要求**：公开接口
      operationId: loginUser
      requestBody:
        required: true
        content:
          application/x-www-form-urlencoded:
            schema:
              type: object
              properties:
                username:
                  type: string
                  description: 用户名
                password:
                  type: string
                  description: 密码
              required:
                - username
                - password
      responses:
        '302':
          description: 登录成功，重定向到管理页面
        '401':
          description: 登录失败
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/ApiErrorResponse'

  # 认证接口 - 登出
  /logout:
    post:
      tags:
        - 认证接口
      summary: 用户登出
      description: |
        用户登出
        
        **权限要求**：需要认证
      operationId: logoutUser
      responses:
        '302':
          description: 登出成功，重定向到首页
        '401':
          description: 未认证

  # 管理员接口
  /admin:
    get:
      tags:
        - 管理接口
      summary: 管理后台首页
      description: |
        管理后台主页
        
        **权限要求**：需要 ROLE_ADMIN 角色
      operationId: adminDashboard
      responses:
        '200':
          description: 管理页面
          content:
            text/html:
              schema:
                type: string
        '401':
          description: 未认证
        '403':
          description: 权限不足

components:
  schemas:
    # 统一响应格式
    ApiResponse:
      type: object
      properties:
        code:
          type: integer
          description: 响应状态码
          example: 200
        message:
          type: string
          description: 响应消息
          example: "操作成功"
        data:
          type: object
          description: 响应数据
          nullable: true
        timestamp:
          type: integer
          format: int64
          description: 时间戳（毫秒）
          example: 1703123456789
      required:
        - code
        - message
        - timestamp

    ApiErrorResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            code:
              example: 400
            message:
              example: "请求参数错误"
            data:
              nullable: true

    ApiResponseShortUrlGenerateResponse:
      allOf:
        - $ref: '#/components/schemas/ApiResponse'
        - type: object
          properties:
            data:
              $ref: '#/components/schemas/ShortUrlGenerateResponse'

    # 请求DTO
    ShortUrlGenerateRequest:
      type: object
      required:
        - originalUrl
      properties:
        originalUrl:
          type: string
          format: uri
          description: 原始长链接
          example: https://www.example.com/very/long/url/that/needs/to/be/shortened
        appId:
          type: string
          description: 应用标识（可选）
          example: myapp
          nullable: true

    ShortUrlCreateRequest:
      type: object
      required:
        - originalUrl
        - name
      properties:
        name:
          type: string
          description: 短链接名称
          example: 我的网站
          maxLength: 100
        originalUrl:
          type: string
          format: uri
          description: 原始长链接
          example: https://www.example.com
        appId:
          type: string
          description: 应用标识（可选）
          example: myapp
          nullable: true
        expiresAt:
          type: string
          format: date-time
          description: 过期时间（可选）
          example: 2026-12-31T23:59:59Z
          nullable: true

    # 响应DTO
    ShortUrlGenerateResponse:
      type: object
      required:
        - shortCode
        - shortUrl
      properties:
        shortCode:
          type: string
          description: 生成的短码
          example: abc123xyz
        shortUrl:
          type: string
          format: uri
          description: 完整的短链接
          example: http://localhost:8080/abc123xyz

    ShortUrlResponse:
      type: object
      properties:
        id:
          type: integer
          format: int64
          description: 主键ID
          example: 1
        name:
          type: string
          description: 短链接名称
          example: 我的网站
        originalUrl:
          type: string
          format: uri
          description: 原始长链接
          example: https://www.example.com
        shortCode:
          type: string
          description: 短码
          example: abc123xyz
        status:
          $ref: '#/components/schemas/ShortUrlStatus'
        clickCount:
          type: integer
          format: int64
          description: 点击次数
          example: 100
        appId:
          type: string
          description: 应用标识
          example: myapp
          nullable: true
        expiresAt:
          type: string
          format: date-time
          description: 过期时间
          example: 2026-12-31T23:59:59Z
          nullable: true
        createdAt:
          type: string
          format: date-time
          description: 创建时间
          example: 2024-01-01T12:00:00Z
        updatedAt:
          type: string
          format: date-time
          description: 更新时间
          example: 2024-01-01T12:00:00Z

    # 枚举类型
    ShortUrlStatus:
      type: string
      description: 短链接状态
      enum:
        - ENABLED
        - DISABLED
      example: ENABLED

    # 错误响应
    ApiErrorResponse:
      type: object
      properties:
        timestamp:
          type: string
          format: date-time
          description: 错误发生时间
        status:
          type: integer
          description: HTTP状态码
        error:
          type: string
          description: 错误类型
        message:
          type: string
          description: 错误消息
        path:
          type: string
          description: 请求路径

  securitySchemes:
    basicAuth:
      type: http
      scheme: basic
    cookieAuth:
      type: apiKey
      in: cookie
      name: JSESSIONID

security:
  - basicAuth: []
  - cookieAuth: []

externalDocs:
  description: 查看更多文档
  url: https://github.com/your-org/ShortURLPro/wiki
  1